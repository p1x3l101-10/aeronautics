"Enable Experience" = true
"Enable Anvil" = true
"Enable Enchanting" = true

[Anvil]
	#Allows custom anvil repair recipes defined via datapacks in data/<modid>/anvil_repairs/*.json.
	"Enable Anvil custom repairs" = true
	#Modifies how materials and item merging work when repairing items in an anvil.
	"Enable Anvil material repair" = true
	#Removes the XP cost for renaming items and prevents anvil degradation when only renaming.
	"Enable Anvil renaming" = true
	#Modifies the XP cost for repairing and merging items in an anvil.
	"Enable Anvil xp cost" = true
	#Changes the chance for anvils to degrade on use and allows repairing anvils with items in the experienceoverhaul:repairs_anvil item tag.
	"Enable Anvil degradation" = true

	#Modifies how materials and item merging work when repairing items in an anvil.
	[Anvil."Anvil material repair"]
		#Percentage increase in materials required to repair an item for each enchantment level on the item.
		# Default: 0.0
		# Range: 0.0 ~ 1.7976931348623157E308
		"Increase materials required with enchantments" = 0.0
		#Flat increase in materials required to repair an item for each enchantment level on the item.
		# Default: 0.0
		# Range: 0.0 ~ 1.7976931348623157E308
		"Increase materials required with enchantments flat" = 0.0
		#Multiplicative percentage decrease to the repair amount for each enchantment level on the item when merging two items.
		# Default: 0.05
		# Range: 0.0 ~ 1.7976931348623157E308
		"Decrease repair amount with enchantments" = 0.05
		#If true, two items of the same type can be merged in the anvil for a repair bonus.
		"Allow merging items" = true
		#Bonus repair percentage when merging two items of the same type. Vanilla is 12%.
		# Default: 10
		# Range: 0 ~ 100
		"Merging repair bonus" = 10

	#Removes the XP cost for renaming items and prevents anvil degradation when only renaming.
	[Anvil."Anvil renaming"]
		#Renaming items in an anvil doesn't cost XP
		"No cost" = true
		#Anvils don't wear down when only used for renaming
		"No break" = true

	#Modifies the XP cost for repairing and merging items in an anvil.
	[Anvil."Anvil xp cost"]
		#Cap for the XP level cost when repairing or merging items in an anvil. Vanilla is 40.
		# Default: 1024
		# Range: > 0
		"Repair cap" = 1024
		#Multiplier for the XP levels required to repair or merge an item. Set to 0 for no cost.
		# Default: 0.0
		# Range: 0.0 ~ 1.7976931348623157E308
		Multiplier = 0.0
		#The XP cost when merging two items is calculated from the resulting item's enchantments rather than the vanilla formula.
		"Merging cost is based off result" = true
		#XP level cost per total enchantment level on the item when repairing with materials. Unenchanted items cost nothing. Overrides the multiplier for material repairs.
		# Default: 0.5
		# Range: 0.0 ~ 1.7976931348623157E308
		"Xp cost per enchantment level" = 0.5

	#Changes the chance for anvils to degrade on use and allows repairing anvils with items in the experienceoverhaul:repairs_anvil item tag.
	[Anvil."Anvil degradation"]
		#Chance for an anvil to become chipped/damaged/break on use. Vanilla is 12%
		# Default: 0.02
		# Range: 0.0 ~ 1.0
		"Degradation chance" = 0.02
		#If true, chipped and damaged anvils can be repaired by right-clicking with an item from the experienceoverhaul:repairs_anvil item tag (iron block by default)
		"Fix anvils" = true

[Experience]
	#Changes the experience lost on death and xp per level required.
	"Enable Player experience" = true
	#Various changes to experience. You can also use the experienceoverhaul:disable_experience game rule to make experience disappear altogether.
	"Enable Dropped experience" = true

	#Changes the experience lost on death and xp per level required.
	[Experience."Player experience"]
		#The experience required to level up will be this xp each level.
		#Set to -1 to disable.
		#Incompatible with Allurement's 'Remove level Scaling' or any other mod that does something similar.
		# Default: 40
		# Range: > -1
		"Linear level up formula" = 40
		#On death, players will drop this percentage of experience instead of max 7 levels. Setting to -1 will disable this.
		#Due to Minecraft limitations this is incompatible with other mods that change the level scaling (e.g. Allurement's 'Remove level Scaling').
		# Default: 0.8
		# Range: -1.0 ~ 1.0
		"Dropped experience on death" = 0.8
		"Pick up experience faster" = true

	#Various changes to experience. You can also use the experienceoverhaul:disable_experience game rule to make experience disappear altogether.
	[Experience."Dropped experience"]
		#ALL Experience dropped will be multiplied by this value, regardless if affected by another multiplier.
		#Use the experienceoverhaul:disable_experience game rule to disable experience completely.
		# Default: 1.0
		# Range: 0.0 ~ 128.0
		"Global multiplier" = 1.0
		#Experience dropped by blocks (Ores and Spawners) will be multiplied by this multiplier. Experience dropped by blocks are still affected by 'Global Experience Multiplier'
		#Can be set to 0 to make blocks drop no experience
		# Default: 1.0
		# Range: 0.0 ~ 128.0
		"Block multiplier" = 1.0
		#Bottle o' enchanting will drop this amount of experience. Can be set to 0 to make Bottle o' enchanting drop no experience
		# Default: 40
		# Range: 0 ~ 512
		"Bottle o' Enchanting XP" = 40

		[Experience."Dropped experience".Mobs]
			#Experience dropped from mobs that come from spawners will be multiplied by this multiplier.
			#Experience dropped by mobs from spawners are still affected by 'Global Experience Multiplier'
			#Can be set to 0 to disable experience drop from mob that come from spawners.
			# Default: 1.0
			# Range: 0.0 ~ 128.0
			"Multiplier: Spawners" = 1.0
			#Experience dropped from mobs that DON'T come from spawners will be multiplied by this multiplier.
			#Experience dropped from mobs that DON'T come from spawners is still affected by 'Global Experience Multiplier'
			#Can be set to 0 to disable experience drop from mob that DON'T come from spawners.
			# Default: 1.0
			# Range: 0.0 ~ 128.0
			"Multiplier: Natural" = 1.0
			#Vanilla mobs drop 1~4 xp per equipment they have.
			# Default: 2
			# Range: > 0
			"Bonus experience per equipment" = 2
			#This is added to 'Bonus experience per equipment'.
			# Default: 3
			# Range: > 0
			"Bonus experience per enchanted equipment" = 3

		#Experience gained from harvesting Honey or Honeycombs from beehives
		[Experience."Dropped experience"."Honey harvest experience"]
			# Default: 3.0
			# Range: 0.0 ~ 1.7976931348623157E308
			Minimum = 3.0
			# Default: 5.0
			# Range: 0.0 ~ 1.7976931348623157E308
			Maximum = 5.0

		#Experience obtained when shearing sheep.
		[Experience."Dropped experience"."Shear xp"]
			# Default: 2.0
			# Range: 0.0 ~ 1.7976931348623157E308
			Minimum = 2.0
			# Default: 3.0
			# Range: 0.0 ~ 1.7976931348623157E308
			Maximum = 3.0

		#Experience obtained when brushing blocks.
		[Experience."Dropped experience"."Brushing xp"]
			# Default: 6.0
			# Range: 0.0 ~ 1.7976931348623157E308
			Minimum = 6.0
			# Default: 10.0
			# Range: 0.0 ~ 1.7976931348623157E308
			Maximum = 10.0
