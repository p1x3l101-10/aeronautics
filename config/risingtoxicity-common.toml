#Toxicity rise defaults for new worlds
[toxicity]
	#Starting Y level of the toxic layer (day 0).
	# Default: -65.0
	# Range: -10000.0 ~ 10000.0
	startHeight = -65.0
	#Final Y level of the toxic layer at peak day. Must be greater than start height.
	# Default: 150.0
	# Range: -10000.0 ~ 10000.0
	peakHeight = 150.0
	#In-game days for the toxic layer to rise from start height to peak height.
	# Default: 20
	# Range: 1 ~ 999
	peakDay = 20

#Player and mob exposure rates and damage
[exposure]
	#Seconds of full submersion in toxic air to reach 100% exposure.
	# Default: 10.0
	# Range: 0.5 ~ 999.0
	fillSeconds = 10.0
	#Seconds in clean air to drain from 100% to 0% exposure.
	# Default: 20.0
	# Range: 0.5 ~ 999.0
	drainSeconds = 20.0
	#Damage in HP per damage tick once exposure is at 100%. 4=2 Hearts
	# Default: 4.0
	# Range: 0.0 ~ 999.0
	damageAmount = 4.0
	#Seconds between damage hits at 100% exposure.
	# Default: 2.0
	# Range: 0.5 ~ 999.0
	damageIntervalSeconds = 2.0

#Fog visuals (color, plane opacity, fog thickness below the plane)
[visuals]
	#Value of red color. RGB
	# Default: 70
	# Range: 0 ~ 255
	fogColorRed = 70
	#Value of green color. RGB
	# Default: 150
	# Range: 0 ~ 255
	fogColorGreen = 150
	#Value of blue color. RGB
	# Default: 35
	# Range: 0 ~ 255
	fogColorBlue = 35
	#Opacity of the toxic plane. 0.0 = invisible, 1.0 = fully opaque.
	# Default: 0.85
	# Range: 0.0 ~ 1.0
	fogPlaneAlpha = 0.85
	#How thick the fog feels when you are below the toxic plane. 1.0 = very foggy, 0.0 = barely any fog.
	# Default: 1.0
	# Range: 0.0 ~ 1.0
	fogDensityBelow = 1.0
	#If false, the toxic plane render distance matches your current Minecraft render distance. If true, it uses the chunk value below.
	manualFogRenderDistance = false
	#Manual toxic plane render distance in chunks. Only used when manualFogRenderDistance is true.
	# Default: 32
	# Range: 1 ~ 9999
	manualFogRenderDistanceChunks = 32

#Gas mask and air tank settings
[mask]
	#How many seconds of air a single full tank provides.
	# Default: 600.0
	# Range: 1.0 ~ 999.0
	secondsPerTank = 600.0
	#Mask capacity percentage at which the low-air warning triggers.
	# Default: 10
	# Range: 1 ~ 99
	lowWarnPercent = 10
	#If true, gas masks take 1 durability damage per tank refill and eventually break. If false, masks never take durability damage (the tier durability values below are ignored).
	durabilityEnabled = true
	#Tier 1 gas mask durability (number of refills until break).
	# Default: 15
	# Range: 1 ~ 999
	tier1Durability = 15
	#Tier 2 (Reinforced) gas mask durability (number of refills until break).
	# Default: 30
	# Range: 1 ~ 999
	tier2Durability = 30
	#Tier 3 (Advanced) gas mask durability (number of refills until break).
	# Default: 50
	# Range: 1 ~ 999
	tier3Durability = 50
	#Seconds in clean air for the mask fog overlay's tick counter to fully clear.
	# Default: 3.0
	# Range: 0.5 ~ 999.0
	cleanAirClearSeconds = 3.0

#Mob behavior toggles
[mobs]
	#If true, passive/neutral mobs take toxicity damage when below the toxic plane.
	passiveMobDamage = true
	#If true, natural spawning of passive/neutral mobs is blocked below the toxic plane.
	passiveMobSpawnBlock = true
	#If true, hostile mobs take toxicity damage when below the toxic plane.
	hostileMobDamage = false
	#If true, natural spawning of hostile mobs is blocked when below the toxic plane.
	hostileMobSpawnBlock = false
	#List of mob IDs that are NEVER affected by toxicity (no damage, no spawn block), regardless of the toggles above.
	excludedMobs = ["minecraft:villager", "minecraft:wandering_trader", "minecraft:iron_golem", "minecraft:snow_golem", "minecraft:wither", "minecraft:ender_dragon", "minecraft:armor_stand"]

#Ambient wheezing sound (random gasps when unprotected in fog)
[ambient]
	#Minimum seconds between ambient wheeze sounds.
	# Default: 8.0
	# Range: 0.5 ~ 999.0
	wheezeMinSeconds = 8.0
	#Maximum seconds between ambient wheeze sounds.
	# Default: 15.0
	# Range: 0.5 ~ 999.0
	wheezeMaxSeconds = 15.0

#Dimensions where toxicity is active
[dimensions]
	#List of dimension IDs where toxic fog will apply. Default: [minecraft:overworld]
	allowedDimensions = ["minecraft:overworld"]
